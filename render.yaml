services:
  - type: web
    name: skindisease-backend
    runtime: node
    rootDir: Backend
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGINS
        value: https://skindisease-frontend.onrender.com,http://localhost:5173

  - type: web
    name: skindisease-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: node server.js
    envVars:
      - key: VITE_API_BASE_URL
        value: https://skindisease-backend-11fq.onrender.com/api
